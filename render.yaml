# Render deployment manifest: RAG Engineering Assistant API
# Docs: https://render.com/docs/blueprint-spec
#
# To deploy: push this repo to GitHub, then on Render dashboard:
#   New + → Blueprint → connect this repo. Render reads this file and
#   provisions the service automatically.
#
# IMPORTANT: Set GROQ_API_KEY and OPENAI_API_KEY as secret environment
# variables in the Render dashboard (Environment tab). Do NOT hardcode them.
# Groq handles intent classification and generation. OpenAI embeds only
# interpretation queries that enter retrieval.

services:
  - type: web
    name: rag-engineering-assistant-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Generation via Groq's free tier (OpenAI-compatible). No credit card.
      # Set GROQ_API_KEY as a secret in the dashboard.
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-20b
      # Embeddings stay on OpenAI (text-embedding-3-small). Cost is negligible,
      # but this key is still required for synthesized-path query embeddings.
      - key: EMBEDDING_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      # Free tier = 512 MB RAM. Keep the torch-heavy reranker OFF (ablation
      # showed it didn't help). Dense + BM25 hybrid stays on and is lightweight.
      - key: USE_RERANKER
        value: "false"
      - key: USE_HYBRID
        value: "true"
      # V2 routing. Groq won the production cost/quality tradeoff on the
      # reviewed holdout, so GPT-4o-mini remains a benchmarked alternative.
      - key: ROUTER_ENABLED
        value: "true"
      - key: INTENT_CLASSIFIER
        value: zero_shot
      - key: INTENT_PROVIDER
        value: groq
      - key: FACTS_DIR
        value: ./data/facts
      - key: VALIDATOR_MODE
        value: flag
